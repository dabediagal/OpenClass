<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Aula Virtual</h2>
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="active">Asignaturas</a>
                <a href="/users">Gestionar usuarios</a>
            </nav>
        </aside>

        <main class="main-content">
            
            <header class="title">
                <h1>Mis Asignaturas</h1>
            </header>

            <section class="subjects">
                {{#subjects}}
                <div class="subject">
                    <p class="nameSubject"><b> {{name}}</b></p>
                    <div class="subject-actions">
                        <a href="/subject/{{id}}" class="btn-view">Ver más</a>
                        <a href="/subject/{{id}}/delete" class="btn-delete">Eliminar</a>
                    </div>
                </div>
                {{/subjects}}
                <a href="/new_subject.html" class="btn-add">+ Añadir asignatura</a>
            </section>

            {{^subjects}}
            <div class="nosubjects">
                <p>No hay asignaturas aún. ¡Crea la primera!</p>
            </div>
            {{/subjects}}

        </main>
    </div>

</body> 
</html>
