<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/delete_subject.js"></script>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Aula Virtual</h2>
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="active">Asignaturas</a>
                {{#isAdmin}}
                <a href="/users">Gestionar usuarios</a>
                {{/isAdmin}}

                {{> profile}}
            </nav>
        </aside>

        <main class="main-content">
            
            <header class="title">
                <h1>Mis Asignaturas</h1>
            </header>

            <section class="subjects">
                {{#subjects}}
                <div class="subject">
                    <p class="nameSubject"><b> {{name}}</b></p>
                    <div class="subject-actions">
                        <a href="/subject/{{id}}" class="btn-view">Ver más</a>
                        {{#isAdmin}}
                        <p><button onclick="deleteSubject({{id}})">Eliminar</a></p>
                        {{/isAdmin}}
                    </div>
                </div>
                {{/subjects}}

                {{#isAdmin}}
                <a href="/new_subject.html" class="btn-add">+ Añadir asignatura</a>
                {{/isAdmin}}

            </section>

            {{^subjects}}
            <div class="nosubjects">
                <p>No hay asignaturas aún.</p>
            </div>
            {{/subjects}}

        </main>
    </div>

</body> 
</html>
