<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/new_subject.css">
    <link rel="stylesheet" href="/css/styles.css">
    <title>Nueva Asignatura</title>
    <script src="/js/new_subject.js"></script>
</head>
<body>
    <div class="app-container">

        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Aula Virtual</h2>
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="active">Añadir asignatura</a>
                <a href="/subjects" class="btn-return-sidebar">Volver</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="title">
                <h1>Nueva Asignatura</h1>
            </header>

            <div class="form-card">
                <form id="newSubject" onsubmit="newSubject(event)">
                    <fieldset>
                        <div class="form-field">
                            <label for="name">Nombre:</label>
                            <input type="text" id="name" name="name">
                        </div>
                        <div class="form-field">
                            <label for="description">Descripción:</label>
                            <input type="text" id="description" name="description">
                        </div>
                        <div class="form-actions">
                            <input type="submit" value="Crear">
                        </div>
                    </fieldset>
                </form>
            </div>
        </main>

    </div>
</body>
</html>
