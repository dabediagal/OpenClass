<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/new_user.css">
    <link rel="stylesheet" href="/css/styles.css">
    <title>Nuevo Usuario</title>
    <script src="/js/new_user.js"></script>
    
</head>
<body>
    <div class="app-container">

        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>Aula Virtual</h2>
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="active">Añadir usuarios</a>
                <a href="/users" class="btn-return-sidebar">Volver</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="title">
                <h1>Nuevo Usuario</h1>
            </header>

            <div class="form-card">
                <form id="newUser" onsubmit="newUser(event)">
                    <fieldset>
                        <div class="form-field">
                            <label for="name">Nombre:</label>
                            <input type="text" id="name" name="name">
                        </div>
                        <div class="form-field">
                            <label>Tipo:</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" id="teacher" name="type" value="teacher">
                                    Profesor
                                </label>
                                <label class="radio-label">
                                    <input type="radio" id="student" name="type" value="student" checked>
                                    Alumno
                                </label>
                            </div>
                        </div>
                        <div class="form-field">
                            <label for="email">Email:</label>
                            <input type="email" name="email" id="email">
                        </div>

                        <div class="form-field">
                            <label for="password">Contraseña:</label>
                            <input type="password" name="password" id="password">
                        </div>
                        <div class="form-field">
                            <label for="password">Repite la contraseña:</label>
                            <input type="password" name="confirm_password" id="confirm_password">
                            
                        </div>
                        <span id="password-message" style="font-size: 0.85rem; font-weight: 500; display: block; margin-top: 5px;"></span>
                        <div class="form-actions">
                            <input type="submit" value="Crear">
                        </div>
                    </fieldset>
                </form>
            </div>
        </main>

    </div>
</body>
</html>
